<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EOW Bhopal — नोटिस तामील</title>
<meta name="theme-color" content="#062a52">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="तामील">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Tiro+Devanagari+Hindi&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg: #eef4fa;
  --primary: #062a52;
  --primary-dark: #051f3d;
  --golden: #f5b942;
  --golden-dark: #e8a82e;
  --good: #1e6b3e;
  --good-soft: #d6ecdf;
  --danger: #a62a23;
  --danger-soft: #fde8e8;
  --ink: #0f1729;
  --ink-soft: #3e4a63;
  --ink-faint: #7783a0;
  --line: #c9d4e3;
  --line-soft: #dde6f0;
  --surface: #fff;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--ink);
  font-family: 'Inter', -apple-system, sans-serif;
  min-height: 100vh;
  padding: 18px 12px;
}
.hindi { font-family: 'Tiro Devanagari Hindi', 'Inter', sans-serif; }
.container { max-width: 560px; margin: 0 auto; }

.header {
  background: var(--primary);
  color: white;
  padding: 20px;
  border-radius: 12px 12px 0 0;
  text-align: center;
}
.header .crest {
  width: 46px; height: 46px;
  background: var(--golden);
  color: var(--primary);
  border-radius: 50%;
  display: inline-flex;
  align-items: center; justify-content: center;
  font-size: 13px; font-weight: 900;
  margin-bottom: 8px;
  border: 2px solid white;
}
.header h1 { font-size: 17px; font-weight: 800; }
.header .sub { font-size: 12px; color: var(--golden); margin-top: 3px; font-weight: 600; letter-spacing: 0.04em; }

.card {
  background: var(--surface);
  border-radius: 0 0 12px 12px;
  padding: 22px 20px;
  box-shadow: 0 4px 14px rgba(6,42,82,0.12);
}

.field { margin-bottom: 16px; }
.label {
  display: block;
  font-size: 13px;
  font-weight: 700;
  color: var(--primary);
  margin-bottom: 6px;
}
.label .req { color: var(--danger); }
.input, .select, .textarea {
  width: 100%;
  padding: 11px 13px;
  border: 1.5px solid var(--line);
  border-radius: 8px;
  font-size: 15px;
  font-family: inherit;
  background: white;
  color: var(--ink);
}
.input:focus, .select:focus, .textarea:focus {
  outline: none;
  border-color: var(--golden);
}
.textarea { resize: vertical; min-height: 70px; }

.btn {
  width: 100%;
  padding: 13px;
  border: none;
  border-radius: 8px;
  font-size: 15px;
  font-weight: 800;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.15s;
}
.btn-primary {
  background: var(--golden);
  color: var(--primary);
}
.btn-primary:active { transform: scale(0.98); }
.btn-primary:disabled { opacity: 0.55; cursor: not-allowed; }
.btn-ghost {
  background: var(--primary-soft, #e6eef8);
  color: var(--primary);
  margin-top: 8px;
}

.pin-input {
  font-size: 26px;
  text-align: center;
  letter-spacing: 0.4em;
  font-weight: 800;
}

.notice-item {
  border: 1.5px solid var(--line);
  border-radius: 10px;
  padding: 14px;
  margin-bottom: 12px;
  background: #fafcff;
}
.notice-item.done { opacity: 0.6; }
.ni-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 10px;
  margin-bottom: 8px;
}
.ni-case {
  font-weight: 800;
  color: var(--primary);
  font-size: 15px;
}
.ni-type {
  display: inline-block;
  background: #fef3c7;
  color: #92400e;
  font-weight: 800;
  font-size: 11px;
  padding: 3px 8px;
  border-radius: 5px;
}
.ni-detail { font-size: 13px; color: var(--ink-soft); margin: 6px 0; }
.ni-dates { font-size: 12px; color: var(--ink-faint); }
.ni-dates b { color: var(--danger); }
.ni-status-done {
  display: inline-block;
  background: var(--good-soft);
  color: var(--good);
  font-size: 11px;
  font-weight: 800;
  padding: 3px 9px;
  border-radius: 5px;
  margin-top: 6px;
}

.radio-row {
  display: flex;
  gap: 10px;
  margin-top: 4px;
}
.radio-opt {
  flex: 1;
  border: 1.5px solid var(--line);
  border-radius: 8px;
  padding: 11px;
  text-align: center;
  font-weight: 700;
  font-size: 14px;
  cursor: pointer;
  transition: all 0.15s;
}
.radio-opt.sel-tameel {
  background: var(--good-soft);
  border-color: var(--good);
  color: var(--good);
}
.radio-opt.sel-adam {
  background: var(--danger-soft);
  border-color: var(--danger);
  color: var(--danger);
}

.loc-box {
  border: 1.5px dashed var(--line);
  border-radius: 8px;
  padding: 14px;
  text-align: center;
  background: #f5f8fc;
}
.loc-box.captured {
  border-style: solid;
  border-color: var(--good);
  background: var(--good-soft);
  text-align: left;
}
.loc-data { font-size: 13px; color: var(--primary); margin-top: 8px; line-height: 1.6; }
.loc-data a { color: #0a58c2; font-weight: 700; }

.toast {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--primary);
  color: white;
  padding: 12px 22px;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 600;
  box-shadow: 0 6px 20px rgba(0,0,0,0.3);
  z-index: 9999;
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
  max-width: 90vw;
  text-align: center;
}
.toast.show { opacity: 1; }
.toast.err { background: var(--danger); }

.hidden { display: none !important; }
.muted { color: var(--ink-faint); font-size: 13px; text-align: center; padding: 20px; }
.back-link {
  display: inline-block;
  margin-bottom: 10px;
  color: var(--primary);
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  background: none;
  border: none;
}
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="crest">EOW</div>
    <h1 class="hindi">नोटिस / समन / वारंट तामील</h1>
    <div class="sub">EOW BHOPAL · MP POLICE</div>
  </div>

  <div class="card">

    <!-- ============ PIN LOGIN ============ -->
    <div id="login-view">
      <div class="field">
        <label class="label hindi">अपना PIN दर्ज करें <span class="req">*</span></label>
        <input type="tel" class="input pin-input" id="pin-input" maxlength="6" placeholder="••••" inputmode="numeric" autocomplete="off">
      </div>
      <button class="btn btn-primary hindi" id="login-btn" onclick="doLogin()">प्रवेश करें</button>
      <div class="muted hindi" id="login-msg" style="margin-top:14px;"></div>
    </div>

    <!-- ============ NOTICE LIST ============ -->
    <div id="list-view" class="hidden">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
        <div>
          <div style="font-weight:800;color:var(--primary);font-size:15px;" id="staff-name" class="hindi">—</div>
          <div style="font-size:12px;color:var(--ink-faint);" id="staff-summary" class="hindi">—</div>
        </div>
        <button class="back-link hindi" onclick="logout()">↩ लॉगआउट</button>
      </div>
      <div id="notice-list"></div>
    </div>

    <!-- ============ TAMEEL FORM ============ -->
    <div id="tameel-view" class="hidden">
      <button class="back-link hindi" onclick="backToList()">↩ वापस सूची में</button>

      <div class="notice-item" style="background:#fff;border-color:var(--golden);">
        <div class="ni-top">
          <span class="ni-case hindi" id="tf-case">—</span>
          <span class="ni-type" id="tf-type">—</span>
        </div>
        <div class="ni-detail hindi" id="tf-detail">—</div>
        <div class="ni-dates hindi" id="tf-dates">—</div>
      </div>

      <div class="field">
        <label class="label hindi">परिणाम <span class="req">*</span></label>
        <div class="radio-row">
          <div class="radio-opt hindi" id="opt-tameel" onclick="setResult('Tameel')">✓ तामील</div>
          <div class="radio-opt hindi" id="opt-adam" onclick="setResult('Adam-Tameel')">✗ अदम-तामील</div>
        </div>
      </div>

      <!-- TAMEEL recipient sub-fields -->
      <div id="tameel-sub" class="hidden">
        <div class="field">
          <label class="label hindi">किसको तामील किया? <span class="req">*</span></label>
          <select class="select hindi" id="tf-recipient-type" onchange="recipientTypeChange()">
            <option value="">— चुनें —</option>
            <option value="Self">स्वयं (जिसके नाम नोटिस है)</option>
            <option value="Family">परिवार सदस्य</option>
            <option value="Other">अन्य व्यक्ति</option>
          </select>
        </div>
        <div class="field hidden" id="tf-relation-field">
          <label class="label hindi">सम्बन्ध <span class="req">*</span></label>
          <select class="select hindi" id="tf-relation">
            <option value="">— चुनें —</option>
            <option>पिता</option>
            <option>माता</option>
            <option>पति</option>
            <option>पत्नी</option>
            <option>पुत्र</option>
            <option>पुत्री</option>
            <option>भाई</option>
            <option>बहन</option>
            <option>अन्य</option>
          </select>
        </div>
        <div class="field hidden" id="tf-rname-field">
          <label class="label hindi">प्राप्तकर्ता का नाम <span class="req">*</span></label>
          <input type="text" class="input hindi" id="tf-recipient-name" placeholder="जिसने नोटिस प्राप्त किया">
        </div>
      </div>

      <!-- ADAM-TAMEEL reason -->
      <div id="adam-sub" class="hidden">
        <div class="field">
          <label class="label hindi">अदम-तामील का कारण <span class="req">*</span></label>
          <select class="select hindi" id="tf-adam-reason">
            <option value="">— चुनें —</option>
            <option>पता नहीं मिला</option>
            <option>व्यक्ति नहीं मिला</option>
            <option>व्यक्ति स्थान छोड़ चुका</option>
            <option>पता गलत/अधूरा</option>
            <option>तामील से इनकार</option>
            <option>अन्य</option>
          </select>
          <input type="text" class="input hindi" id="tf-adam-other" placeholder="कारण लिखें…" style="margin-top:8px;display:none;">
        </div>
      </div>

      <!-- LOCATION (mandatory both cases) -->
      <div class="field">
        <label class="label hindi">📍 स्थान टैग करें <span class="req">*</span></label>
        <div class="loc-box" id="loc-box">
          <button class="btn btn-ghost hindi" onclick="captureLocation()" id="loc-btn" style="margin-top:0;">📍 वर्तमान स्थान कैप्चर करें</button>
          <div class="loc-data hindi hidden" id="loc-data"></div>
        </div>
      </div>

      <button class="btn btn-primary hindi" id="submit-btn" onclick="submitTameel()">जमा करें</button>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var SUPABASE_URL = 'https://hwfdeqlqavakyakugyqq.supabase.co';
var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh3ZmRlcWxxYXZha3lha3VneXFxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczODE0MzksImV4cCI6MjA5Mjk1NzQzOX0.QPp6vuVl_LqNZ-2GYMNx5m56L7XSWe0A7IiFcmoHeSw';
var supa = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ═══ TEST MODE — ?test=1 → form acts only on TEST notices (is_test=true), real notices safe ═══
var IS_TEST_MODE = (new URLSearchParams(window.location.search).get('test') === '1');
if (IS_TEST_MODE) {
  try {
    var _tb = document.createElement('div');
    _tb.className = 'test-mode-banner';
    _tb.innerHTML = '🧪 TEST MODE — sirf TEST notices dikhenge. Real notices safe rahenge.';
    _tb.style.cssText = 'position:sticky;top:0;z-index:9999;background:#dc2626;color:#fff;padding:10px 14px;font-size:12.5px;font-weight:700;text-align:center;line-height:1.4;box-shadow:0 2px 8px rgba(0,0,0,0.2);';
    document.body.insertBefore(_tb, document.body.firstChild);
    document.title = '🧪 TEST — ' + document.title;
  } catch(e){}
}


function toast(msg, isErr) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isErr ? ' err' : '');
  setTimeout(function(){ t.className = 'toast'; }, 3200);
}

function fmtDate(d) {
  if (!d) return '—';
  try {
    var dt = new Date(d);
    if (isNaN(dt.getTime())) return d;
    return dt.toLocaleDateString('hi-IN', { day:'numeric', month:'short', year:'numeric' });
  } catch(e) { return d; }
}

// ============ PIN LOGIN ============
async function doLogin() {
  var pin = (document.getElementById('pin-input').value || '').trim();
  var msg = document.getElementById('login-msg');
  if (!pin) { msg.textContent = 'कृपया PIN दर्ज करें'; return; }
  var btn = document.getElementById('login-btn');
  btn.disabled = true;
  msg.textContent = 'जाँच हो रही है…';
  try {
    var r = await supa.from('io_master').select('id,name,rank,pin').eq('pin', pin).limit(1);
    if (r.error) throw r.error;
    if (!r.data || !r.data.length) {
      msg.textContent = 'गलत PIN — पुनः प्रयास करें';
      btn.disabled = false;
      return;
    }
    var s = r.data[0];
    currentStaff = {
      id: s.id,
      name: s.name,
      rank: s.rank || '',
      displayName: (s.rank ? s.rank + ' ' : '') + s.name
    };
    document.getElementById('login-view').classList.add('hidden');
    document.getElementById('list-view').classList.remove('hidden');
    document.getElementById('staff-name').textContent = 'नमस्ते, ' + currentStaff.displayName;
    await loadMyNotices();
  } catch(e) {
    msg.textContent = 'त्रुटि: ' + (e.message || e);
    btn.disabled = false;
  }
}

function logout() {
  currentStaff = null;
  currentNotice = null;
  document.getElementById('pin-input').value = '';
  document.getElementById('login-msg').textContent = '';
  document.getElementById('login-btn').disabled = false;
  document.getElementById('list-view').classList.add('hidden');
  document.getElementById('tameel-view').classList.add('hidden');
  document.getElementById('login-view').classList.remove('hidden');
}

// ============ NOTICE LIST ============
async function loadMyNotices() {
  var listEl = document.getElementById('notice-list');
  listEl.innerHTML = '<div class="muted hindi">लोड हो रहा है…</div>';
  try {
    var r = await supa.from('notices').select('*')
      .eq('assigned_to', currentStaff.displayName)
      .eq('is_test', IS_TEST_MODE)
      .order('appearance_date', { ascending: true });
    if (r.error) throw r.error;
    var rows = r.data || [];
    var pending = rows.filter(function(n){ return n.status !== 'Served'; });
    var done = rows.filter(function(n){ return n.status === 'Served'; });
    document.getElementById('staff-summary').textContent =
      'कुल ' + rows.length + ' · लंबित ' + pending.length + ' · पूर्ण ' + done.length;

    if (!rows.length) {
      listEl.innerHTML = '<div class="muted hindi">आपको अभी कोई नोटिस तामील हेतु नहीं दिया गया है।</div>';
      return;
    }
    listEl.innerHTML = rows.map(function(n){
      var isDone = (n.status === 'Served');
      return '<div class="notice-item' + (isDone ? ' done' : '') + '">' +
        '<div class="ni-top">' +
          '<span class="ni-case hindi">' + (n.case_display || '—') + '</span>' +
          '<span class="ni-type">' + (n.notice_type || '') + '</span>' +
        '</div>' +
        '<div class="ni-detail hindi">' + (n.notice_detail || '') + '</div>' +
        '<div class="ni-dates hindi">जारी: ' + fmtDate(n.notice_date) +
          ' · उपस्थिति: <b>' + fmtDate(n.appearance_date) + '</b></div>' +
        (isDone
          ? '<div class="ni-status-done hindi">✓ ' + (n.tameel_result || 'पूर्ण') + '</div>'
          : '<button class="btn btn-primary hindi" style="margin-top:10px;padding:9px;" onclick=\'openTameel(' +
              JSON.stringify(JSON.stringify(n)) + ')\'>तामील करें</button>') +
      '</div>';
    }).join('');
  } catch(e) {
    listEl.innerHTML = '<div class="muted hindi">त्रुटि: ' + (e.message || e) + '</div>';
  }
}

// ============ TAMEEL FORM ============
function openTameel(noticeJson) {
  currentNotice = JSON.parse(noticeJson);
  currentResult = null;
  capturedLoc = null;
  document.getElementById('list-view').classList.add('hidden');
  document.getElementById('tameel-view').classList.remove('hidden');

  document.getElementById('tf-case').textContent = currentNotice.case_display || '—';
  document.getElementById('tf-type').textContent = currentNotice.notice_type || '—';
  document.getElementById('tf-detail').textContent = currentNotice.notice_detail || '—';
  document.getElementById('tf-dates').innerHTML = 'जारी: ' + fmtDate(currentNotice.notice_date) +
    ' · उपस्थिति: <b>' + fmtDate(currentNotice.appearance_date) + '</b>';

  // Reset form
  document.getElementById('opt-tameel').className = 'radio-opt hindi';
  document.getElementById('opt-adam').className = 'radio-opt hindi';
  document.getElementById('tameel-sub').classList.add('hidden');
  document.getElementById('adam-sub').classList.add('hidden');
  document.getElementById('tf-recipient-type').value = '';
  document.getElementById('tf-relation').value = '';
  document.getElementById('tf-recipient-name').value = '';
  document.getElementById('tf-relation-field').classList.add('hidden');
  document.getElementById('tf-rname-field').classList.add('hidden');
  document.getElementById('tf-adam-reason').value = '';
  document.getElementById('tf-adam-other').value = '';
  document.getElementById('tf-adam-other').style.display = 'none';
  var lb = document.getElementById('loc-box');
  lb.className = 'loc-box';
  document.getElementById('loc-data').className = 'loc-data hindi hidden';
  document.getElementById('loc-btn').classList.remove('hidden');
}

function backToList() {
  document.getElementById('tameel-view').classList.add('hidden');
  document.getElementById('list-view').classList.remove('hidden');
}

function setResult(res) {
  currentResult = res;
  document.getElementById('opt-tameel').className = 'radio-opt hindi' + (res === 'Tameel' ? ' sel-tameel' : '');
  document.getElementById('opt-adam').className = 'radio-opt hindi' + (res === 'Adam-Tameel' ? ' sel-adam' : '');
  document.getElementById('tameel-sub').classList.toggle('hidden', res !== 'Tameel');
  document.getElementById('adam-sub').classList.toggle('hidden', res !== 'Adam-Tameel');
}

function recipientTypeChange() {
  var v = document.getElementById('tf-recipient-type').value;
  var relF = document.getElementById('tf-relation-field');
  var nameF = document.getElementById('tf-rname-field');
  if (v === 'Self') {
    relF.classList.add('hidden');
    nameF.classList.add('hidden');
  } else if (v === 'Family' || v === 'Other') {
    relF.classList.remove('hidden');
    nameF.classList.remove('hidden');
  } else {
    relF.classList.add('hidden');
    nameF.classList.add('hidden');
  }
}

document.getElementById('tf-adam-reason').addEventListener('change', function(){
  var other = document.getElementById('tf-adam-other');
  other.style.display = (this.value === 'अन्य') ? 'block' : 'none';
});

// ============ LOCATION CAPTURE ============
function captureLocation() {
  var btn = document.getElementById('loc-btn');
  if (!navigator.geolocation) {
    toast('इस डिवाइस पर GPS उपलब्ध नहीं है', true);
    return;
  }
  btn.textContent = '📍 स्थान प्राप्त हो रहा है…';
  btn.disabled = true;
  navigator.geolocation.getCurrentPosition(
    function(pos) {
      capturedLoc = {
        lat: pos.coords.latitude,
        long: pos.coords.longitude,
        accuracy: Math.round(pos.coords.accuracy),
        time: new Date().toISOString()
      };
      var lb = document.getElementById('loc-box');
      lb.className = 'loc-box captured';
      btn.classList.add('hidden');
      var ld = document.getElementById('loc-data');
      ld.className = 'loc-data hindi';
      var mapUrl = 'https://www.google.com/maps?q=' + capturedLoc.lat + ',' + capturedLoc.long;
      var tStr = new Date(capturedLoc.time).toLocaleTimeString('hi-IN');
      ld.innerHTML =
        '✓ <b>स्थान कैप्चर हुआ</b><br>' +
        'अक्षांश: ' + capturedLoc.lat.toFixed(6) + '<br>' +
        'देशांतर: ' + capturedLoc.long.toFixed(6) + '<br>' +
        'सटीकता: ~' + capturedLoc.accuracy + ' मीटर<br>' +
        'समय: ' + tStr + '<br>' +
        '<a href="' + mapUrl + '" target="_blank">📍 Google Maps में देखें</a>';
    },
    function(err) {
      btn.textContent = '📍 पुनः प्रयास करें';
      btn.disabled = false;
      var m = 'स्थान प्राप्त नहीं हुआ';
      if (err.code === 1) m = 'कृपया location permission "Allow" करें';
      else if (err.code === 2) m = 'स्थान उपलब्ध नहीं — खुले में जाकर प्रयास करें';
      else if (err.code === 3) m = 'समय समाप्त — पुनः प्रयास करें';
      toast(m, true);
    },
    { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
  );
}

// ============ SUBMIT ============
async function submitTameel() {
  if (!currentResult) { toast('कृपया परिणाम चुनें (तामील / अदम-तामील)', true); return; }

  var patch = {
    tameel_result: currentResult,
    tameel_done_by: currentStaff.displayName,
    tameel_submitted_at: new Date().toISOString()
  };

  if (currentResult === 'Tameel') {
    var rType = document.getElementById('tf-recipient-type').value;
    if (!rType) { toast('कृपया चुनें — किसको तामील किया', true); return; }
    patch.recipient_type = rType;
    if (rType === 'Self') {
      patch.recipient_name = '(स्वयं)';
      patch.recipient_relation = 'Self';
    } else {
      var rel = document.getElementById('tf-relation').value;
      var rnm = document.getElementById('tf-recipient-name').value.trim();
      if (!rel) { toast('कृपया सम्बन्ध चुनें', true); return; }
      if (!rnm) { toast('कृपया प्राप्तकर्ता का नाम लिखें', true); return; }
      patch.recipient_relation = rel;
      patch.recipient_name = rnm;
    }
    patch.status = 'Served';
    patch.served_date = new Date().toISOString().slice(0,10);
  } else {
    // Adam-Tameel
    var ar = document.getElementById('tf-adam-reason').value;
    if (!ar) { toast('कृपया अदम-तामील का कारण चुनें', true); return; }
    if (ar === 'अन्य') {
      var ao = document.getElementById('tf-adam-other').value.trim();
      if (!ao) { toast('कृपया कारण लिखें', true); return; }
      patch.adam_reason = ao;
    } else {
      patch.adam_reason = ar;
    }
    patch.status = 'Pending';   // adam-tameel stays trackable
  }

  // Location mandatory for BOTH
  if (!capturedLoc) {
    toast('कृपया स्थान टैग करें — यह अनिवार्य है', true);
    return;
  }
  patch.loc_lat = capturedLoc.lat;
  patch.loc_long = capturedLoc.long;
  patch.loc_accuracy = capturedLoc.accuracy;
  patch.loc_captured_at = capturedLoc.time;

  var btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = 'जमा हो रहा है…';
  try {
    var r = await supa.from('notices').update(patch).eq('id', currentNotice.id);
    if (r.error) throw r.error;
    toast('✓ सफलतापूर्वक दर्ज हुआ');
    setTimeout(function(){
      backToList();
      loadMyNotices();
      btn.disabled = false;
      btn.textContent = 'जमा करें';
    }, 1100);
  } catch(e) {
    toast('त्रुटि: ' + (e.message || e), true);
    btn.disabled = false;
    btn.textContent = 'जमा करें';
  }
}

// Enter key on PIN
document.getElementById('pin-input').addEventListener('keypress', function(e){
  if (e.key === 'Enter') doLogin();
});
