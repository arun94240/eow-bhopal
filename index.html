<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EOW Office Bhopal</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Tiro+Devanagari+Hindi&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: linear-gradient(135deg, #134d8a 0%, #0a3760 100%);
  color: white;
  font-family: 'Inter', -apple-system, sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.hindi { font-family: 'Tiro Devanagari Hindi', 'Inter', sans-serif; }

.container {
  max-width: 580px;
  width: 100%;
  text-align: center;
}

.crest-mark {
  width: 70px; height: 70px;
  background: white; color: #134d8a;
  border-radius: 50%;
  display: inline-flex;
  align-items: center; justify-content: center;
  font-size: 22px; font-weight: 700;
  margin-bottom: 20px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.2);
}

h1 {
  font-size: 32px;
  font-weight: 700;
  margin-bottom: 8px;
  letter-spacing: -0.01em;
}

.tagline {
  font-size: 13px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.8);
  margin-bottom: 36px;
  font-weight: 500;
}

.cards {
  display: grid;
  gap: 14px;
}

.card {
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.2);
  padding: 22px 24px;
  border-radius: 12px;
  text-decoration: none;
  color: white;
  transition: all 0.2s;
  text-align: left;
  display: block;
  backdrop-filter: blur(10px);
}

.card:hover {
  background: rgba(255,255,255,0.18);
  border-color: rgba(255,255,255,0.4);
  transform: translateY(-2px);
}

.card-icon {
  font-size: 28px;
  margin-bottom: 10px;
}

.card h3 {
  font-size: 18px;
  font-weight: 600;
  margin-bottom: 4px;
}

.card p {
  font-size: 13px;
  color: rgba(255,255,255,0.8);
  line-height: 1.5;
}

.footer {
  margin-top: 30px;
  font-size: 12px;
  color: rgba(255,255,255,0.6);
  letter-spacing: 0.05em;
}
</style>
</head>
<body>

<div class="container">
  <div class="crest-mark">EOW</div>
  <h1>EOW Office Bhopal</h1>
  <div class="tagline">Economic Offences Wing · MP Police</div>

  <div class="cards">
    <a href="io-form.html" class="card">
      <div class="card-icon">📋</div>
      <h3 class="hindi">दैनिक प्रगति प्रतिवेदन</h3>
      <p>For Investigating Officers — submit case progress updates</p>
    </a>

    <a href="leave-form.html" class="card">
      <div class="card-icon">🏖</div>
      <h3 class="hindi">अवकाश आवेदन</h3>
      <p>For officers and staff — apply for leave</p>
    </a>

    <a href="supervisor.html" class="card" style="opacity:0.7;">
      <div class="card-icon">🔐</div>
      <h3>Supervisor Dashboard</h3>
      <p>Authorised access only — for SP and senior staff</p>
    </a>
  </div>

  <div class="footer">For internal use only</div>
</div>

</body>
</html>
